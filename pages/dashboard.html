<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仪表盘 - Mingine 的小站</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/image00.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    .dashboard-page { min-height: 100vh; background: var(--bg-color); }
    .dash-container { max-width: 1300px; margin: calc(var(--nav-height) + 30px) auto 40px auto; padding: 0 20px; }

    .dash-header {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
      margin-bottom: 24px;
    }
    .dash-header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 10px; }
    .dash-last-update { font-size: 0.85rem; opacity: 0.6; }

    /* 概览卡片 */
    .dash-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .dash-card {
      padding: 20px 24px; display: flex; align-items: center; gap: 16px;
      transition: transform 0.2s;
    }
    .dash-card:hover { transform: translateY(-2px); }
    .dash-card-icon {
      width: 52px; height: 52px; border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 1.4rem; color: #fff; flex-shrink: 0;
    }
    .dash-card-icon.pink { background: #FB7299; }
    .dash-card-icon.blue { background: #00AEEC; }
    .dash-card-icon.green { background: #6DC781; }
    .dash-card-icon.orange { background: #FFB347; }
    .dash-card-info .dash-card-value { font-size: 1.6rem; font-weight: 800; line-height: 1.2; }
    .dash-card-info .dash-card-label { font-size: 0.85rem; opacity: 0.65; }

    /* 图表区域 */
    .dash-charts { display: grid; grid-template-columns: 1.4fr 1fr; gap: 18px; margin-bottom: 24px; }
    .dash-chart-card { padding: 20px; }
    .dash-chart-card h3 { font-size: 1.05rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .dash-chart-card canvas { max-height: 320px; }

    /* 在线用户卡片 */
    .online-card { padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .online-dot { width: 14px; height: 14px; border-radius: 50%; background: #6DC781; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .online-count { font-size: 1.4rem; font-weight: 700; }
    .online-detail { display: flex; flex-wrap: wrap; gap: 6px; margin-left: auto; }
    .online-tag {
      font-size: 0.8rem; padding: 4px 10px; border-radius: 999px;
      background: rgba(109,199,129,0.15); color: #6DC781;
    }

    /* 访客列表 */
    .visitor-card { padding: 20px; }
    .visitor-card h3 { font-size: 1.05rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .visitor-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .visitor-table th, .visitor-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--glass-border); }
    .visitor-table th { font-weight: 600; opacity: 0.75; font-size: 0.82rem; }
    .visitor-table td { color: var(--text-color); }
    .visitor-location { display: flex; align-items: center; gap: 4px; }
    .visitor-location .flag { font-size: 1.1rem; }

    /* 响应式 */
    @media (max-width: 768px) {
      .dash-charts { grid-template-columns: 1fr; }
      .dash-cards { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body class="dashboard-page">
  <nav class="navbar glass">
    <a href="../index.html" class="nav-brand">Mingine</a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="dashboard.html" style="font-weight:700;color:var(--accent-color);">仪表盘</a>
      <a href="contact.html">联系我</a>
      <button class="theme-toggle" id="theme-btn" aria-label="切换主题">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <div class="dash-container">
    <div class="dash-header">
      <h1><i class="fas fa-chart-line"></i> 仪表盘</h1>
      <span class="dash-last-update" id="last-update"></span>
    </div>

    <!-- 概览卡片 -->
    <div class="dash-cards">
      <div class="dash-card glass">
        <div class="dash-card-icon blue"><i class="fas fa-eye"></i></div>
        <div class="dash-card-info">
          <div class="dash-card-value" id="today-pv">-</div>
          <div class="dash-card-label">今日 PV</div>
        </div>
      </div>
      <div class="dash-card glass">
        <div class="dash-card-icon pink"><i class="fas fa-users"></i></div>
        <div class="dash-card-info">
          <div class="dash-card-value" id="today-uv">-</div>
          <div class="dash-card-label">今日 UV</div>
        </div>
      </div>
      <div class="dash-card glass">
        <div class="dash-card-icon green"><i class="fas fa-globe"></i></div>
        <div class="dash-card-info">
          <div class="dash-card-value" id="total-pv">-</div>
          <div class="dash-card-label">累计 PV</div>
        </div>
      </div>
      <div class="dash-card glass">
        <div class="dash-card-icon orange"><i class="fas fa-user-check"></i></div>
        <div class="dash-card-info">
          <div class="dash-card-value" id="total-uv">-</div>
          <div class="dash-card-label">累计 UV</div>
        </div>
      </div>
    </div>

    <!-- 在线人数 -->
    <div class="online-card glass">
      <span class="online-dot"></span>
      <span class="online-count"><span id="online-num">0</span> 人在线</span>
      <div class="online-detail" id="online-detail"></div>
    </div>

    <!-- 图表区 -->
    <div class="dash-charts">
      <div class="dash-chart-card glass">
        <h3><i class="fas fa-chart-line"></i> 近 7 天 PV / UV 趋势</h3>
        <canvas id="trendChart"></canvas>
      </div>
      <div class="dash-chart-card glass">
        <h3><i class="fas fa-chart-pie"></i> 模块使用统计</h3>
        <canvas id="moduleChart"></canvas>
      </div>
    </div>

    <!-- 访客记录 -->
    <div class="visitor-card glass">
      <h3><i class="fas fa-history"></i> 历史访问记录</h3>
      <div style="overflow-x:auto;">
        <table class="visitor-table">
          <thead><tr><th>位置</th><th>访问次数</th><th>最近访问</th></tr></thead>
          <tbody id="visitor-tbody"><tr><td colspan="3" style="text-align:center;opacity:0.5;">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    // ==========================================
    // 仪表盘 — 前端逻辑
    // ==========================================
    const DASH_API = (() => {
      try { return new URL('../server/api/analytics.php', window.location.href).toString(); }
      catch(e) { return window.location.origin + '/server/api/analytics.php'; }
    })();

    let trendChart = null;
    let moduleChart = null;

    // ── 加载看板数据 ──
    async function loadDashboard() {
      try {
        const res = await fetch(DASH_API + '?action=dashboard');
        const data = await res.json();

        document.getElementById('today-pv').textContent = data.todayPv || 0;
        document.getElementById('today-uv').textContent = data.todayUv || 0;
        document.getElementById('total-pv').textContent = data.totalPv || 0;
        document.getElementById('total-uv').textContent = data.totalUv || 0;

        renderTrendChart(data.trend || []);
        renderModuleChart(data.moduleStats || []);
        document.getElementById('last-update').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
      } catch (e) {
        console.error('加载看板失败', e);
      }
    }

    // ── 折线图 ──
    function renderTrendChart(trend) {
      const ctx = document.getElementById('trendChart').getContext('2d');
      const labels = trend.map(t => t.date.slice(5));
      const pvData = trend.map(t => t.pv);
      const uvData = trend.map(t => t.uv);

      if (trendChart) trendChart.destroy();

      const isDark = document.body.getAttribute('data-theme') === 'dark';
      const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      const textColor = isDark ? '#9499A0' : '#666';

      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'PV', data: pvData, borderColor: '#00AEEC', backgroundColor: 'rgba(0,174,236,0.08)', fill: true, tension: 0.4, pointRadius: 4 },
            { label: 'UV', data: uvData, borderColor: '#FB7299', backgroundColor: 'rgba(251,114,153,0.08)', fill: true, tension: 0.4, pointRadius: 4 },
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: { legend: { labels: { color: textColor, usePointStyle: true, padding: 20 } } },
          scales: {
            x: { grid: { color: gridColor }, ticks: { color: textColor } },
            y: { grid: { color: gridColor }, ticks: { color: textColor, stepSize: 1 }, beginAtZero: true },
          },
        }
      });
    }

    // ── 饼图 ──
    function renderModuleChart(stats) {
      const ctx = document.getElementById('moduleChart').getContext('2d');
      const colors = ['#FB7299','#00AEEC','#6DC781','#FFB347','#8B5CF6','#F97316','#06B6D4','#EC4899'];

      if (moduleChart) moduleChart.destroy();

      moduleChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: stats.map(s => s.name),
          datasets: [{ data: stats.map(s => s.count), backgroundColor: colors.slice(0, stats.length), borderWidth: 0 }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: document.body.getAttribute('data-theme') === 'dark' ? '#9499A0' : '#666', padding: 14, usePointStyle: true },
            },
          },
        }
      });
    }

    // ── 在线人数 ──
    async function loadOnline() {
      try {
        const res = await fetch(DASH_API + '?action=online');
        const data = await res.json();
        document.getElementById('online-num').textContent = data.online || 0;
        const detail = document.getElementById('online-detail');
        if (data.details && data.details.length > 0) {
          detail.innerHTML = data.details.map(d =>
            '<span class="online-tag">' +
            (d.country || '未知') + (d.province ? ' ' + d.province : '') +
            '</span>'
          ).join('');
        } else {
          detail.innerHTML = '<span style="opacity:0.4;font-size:0.85rem;">暂无在线用户</span>';
        }
      } catch (e) { /* ignore */ }
    }

    // ── 访客列表 ──
    async function loadVisitors() {
      try {
        const res = await fetch(DASH_API + '?action=visitors&page=1');
        const data = await res.json();
        const tbody = document.getElementById('visitor-tbody');
        if (!data.visitors || data.visitors.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;opacity:0.5;">暂无访问记录</td></tr>';
          return;
        }
        tbody.innerHTML = data.visitors.map(v => {
          const loc = [v.country, v.province].filter(Boolean).join(' ');
          const date = new Date(v.lastVisit + 'Z').toLocaleString('zh-CN', {
            month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
          });
          return '<tr><td><span class="visitor-location">📍 ' + (loc || '未知') + '</span></td><td>' + v.visitCount + ' 次</td><td>' + date + '</td></tr>';
        }).join('');
      } catch (e) { /* ignore */ }
    }

    // ── 初始化 ──
    loadDashboard();
    loadOnline();
    loadVisitors();

    // 每 30 秒刷新在线人数
    setInterval(loadOnline, 30000);
    // 每 5 分钟刷新看板数据
    setInterval(() => { loadDashboard(); loadVisitors(); }, 300000);
  </script>
</body>
</html>
