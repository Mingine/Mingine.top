<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客 - Mingine 的小站</title>
  <link rel="icon" type="image/jpeg" href="../assets/images/image00.png">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .blog-page { min-height: 100vh; background: var(--bg-color); }
    .blog-container { max-width: 1100px; margin: calc(var(--nav-height) + 30px) auto 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 280px; gap: 24px; }
    @media (max-width: 768px) { .blog-container { grid-template-columns: 1fr; } .blog-toc { display: none !important; } }

    /* 文章列表 */
    .blog-posts { display: flex; flex-direction: column; gap: 20px; }
    .blog-card {
      display: flex; gap: 16px; padding: 20px; transition: transform 0.2s; cursor: pointer;
    }
    .blog-card:hover { transform: translateY(-2px); }
    .blog-card-cover {
      width: 200px; height: 130px; border-radius: 10px; object-fit: cover; flex-shrink: 0;
      background: var(--glass-border);
    }
    .blog-card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .blog-card-cat {
      font-size: 0.8rem; color: var(--accent-color); font-weight: 600; margin-bottom: 4px;
    }
    .blog-card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .blog-card-excerpt { font-size: 0.9rem; opacity: 0.72; line-height: 1.55; flex: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .blog-card-meta { display: flex; gap: 14px; font-size: 0.8rem; opacity: 0.55; margin-top: 8px; align-items: center; flex-wrap: wrap; }
    .blog-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .blog-tag {
      font-size: 0.75rem; padding: 2px 8px; border-radius: 999px;
      background: rgba(59,130,246,0.1); color: var(--accent-color);
    }
    @media (max-width: 600px) {
      .blog-card { flex-direction: column; }
      .blog-card-cover { width: 100%; height: 160px; }
    }

    /* 侧边栏 */
    .blog-sidebar { display: flex; flex-direction: column; gap: 20px; }
    .blog-sidebar-card { padding: 18px; }
    .blog-sidebar-card h3 { font-size: 1rem; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
    .blog-sidebar-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .blog-sidebar-item {
      font-size: 0.84rem; padding: 4px 10px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--glass-border); color: var(--text-color); opacity: 0.8;
      transition: all 0.2s; text-decoration: none; display: inline-block;
    }
    .blog-sidebar-item:hover, .blog-sidebar-item.active { border-color: var(--accent-color); color: var(--accent-color); opacity: 1; }
    .blog-sidebar-count { font-size: 0.75rem; opacity: 0.5; margin-left: 2px; }

    /* 文章详情 */
    .blog-detail { display: none; }
    .blog-detail.active { display: block; }
    .blog-detail h1 { font-size: 1.8rem; margin-bottom: 12px; }
    .blog-detail-meta { display: flex; gap: 14px; font-size: 0.85rem; opacity: 0.6; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .blog-detail-cover { width: 100%; max-height: 400px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }
    .blog-detail-content { line-height: 1.85; font-size: 1rem; }
    .blog-detail-content h2,.blog-detail-content h3,.blog-detail-content h4,.blog-detail-content h5,.blog-detail-content h6 {
      margin: 1.6em 0 0.5em; scroll-margin-top: calc(var(--nav-height) + 20px);
    }
    .blog-detail-content h2 { font-size: 1.45rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 6px; }
    .blog-detail-content p { margin: 0.8em 0; }
    .blog-detail-content img { max-width: 100%; border-radius: 8px; }
    .blog-detail-content pre { background: var(--glass-border); padding: 14px; border-radius: 8px; overflow-x: auto; font-size: 0.88rem; margin: 1em 0; }
    .blog-detail-content code { background: var(--glass-border); padding: 2px 6px; border-radius: 4px; font-size: 0.88em; }
    .blog-detail-content pre code { background: none; padding: 0; }
    .blog-detail-content blockquote { border-left: 3px solid var(--accent-color); padding-left: 14px; opacity: 0.8; margin: 1em 0; }
    /* 分割线 */
    .blog-detail-content hr { margin: 2em 0; border: none; border-top: 1px solid var(--glass-border); }
    /* 列表 */
    .blog-detail-content ul,.blog-detail-content ol { padding-left: 1.8em; margin: 0.6em 0; }
    .blog-detail-content li { margin: 0.25em 0; }
    .blog-detail-content ul ul,.blog-detail-content ol ol,.blog-detail-content ul ol,.blog-detail-content ol ul { padding-left: 1.5em; margin: 0.2em 0; }
    /* 表格 */
    .blog-detail-content table { width: 100%; border-collapse: collapse; margin: 1.2em 0; font-size: 0.92rem; }
    .blog-detail-content th,.blog-detail-content td { border: 1px solid var(--glass-border); padding: 10px 14px; text-align: left; }
    .blog-detail-content th { background: var(--glass-border); font-weight: 600; }
    .blog-detail-content tr:nth-child(even) td { background: rgba(128,128,128,0.04); }
    /* 任务列表 */
    .blog-detail-content input[type="checkbox"] { margin-right: 6px; }

    .blog-back { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; cursor: pointer; color: var(--accent-color); font-size: 0.9rem; border: none; background: none; }

    /* 分页 */
    .blog-pagination { display: flex; justify-content: center; gap: 6px; margin-top: 24px; }
    .blog-page-btn {
      min-width: 34px; height: 34px; border: 1px solid var(--glass-border); border-radius: 8px;
      background: transparent; color: var(--text-color); font-size: 0.88rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    .blog-page-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
    .blog-page-btn.active { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
    .blog-page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .blog-loading { text-align: center; padding: 60px; opacity: 0.5; }

    /* 文章目录 */
    .blog-toc { display: none; position: sticky; top: calc(var(--nav-height) + 20px); }
    .blog-toc.active { display: block; }
    .blog-toc-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 10px; opacity: 0.8; }
    .blog-toc-list { list-style: none; padding: 0; margin: 0; max-height: calc(100vh - 160px); overflow-y: auto; }
    .blog-toc-item { padding: 4px 0; font-size: 0.85rem; border-left: 2px solid transparent; padding-left: 10px; transition: all 0.2s; cursor: pointer; }
    .blog-toc-item:hover, .blog-toc-item.active { border-left-color: var(--accent-color); color: var(--accent-color); }
    .blog-toc-item.toc-h2 { padding-left: 10px; font-weight: 600; }
    .blog-toc-item.toc-h3 { padding-left: 22px; font-size: 0.8rem; opacity: 0.85; }
    .blog-toc-item a { color: inherit; text-decoration: none; display: block; }
  </style>
</head>
<body class="blog-page">
  <nav class="navbar glass">
    <a href="../index.html" class="nav-brand">Mingine</a>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="blog.html" style="font-weight:700;color:var(--accent-color);">博客</a>
      <a href="dashboard.html">仪表盘</a>
      <a href="contact.html">联系我</a>
      <button class="theme-toggle" id="theme-btn" aria-label="切换主题"><i class="fas fa-moon"></i></button>
    </div>
  </nav>

  <div class="blog-container">
    <!-- 文章列表 -->
    <div>
      <div id="blog-list-view">
        <h1 style="font-size:1.6rem;margin-bottom:20px;"><i class="fas fa-blog"></i> 博客文章</h1>
        <div class="blog-posts" id="blog-posts"><div class="blog-loading">加载中...</div></div>
        <div class="blog-pagination" id="blog-pagination"></div>
      </div>

      <!-- 文章详情（含目录） -->
      <div class="blog-detail" id="blog-detail">
        <button class="blog-back" onclick="showList()"><i class="fas fa-arrow-left"></i> 返回列表</button>
        <div style="display:flex;gap:24px;">
          <aside class="blog-toc" id="blog-toc">
            <div class="blog-toc-title"><i class="fas fa-list"></i> 目录</div>
            <ul class="blog-toc-list" id="toc-list"></ul>
          </aside>
          <div id="detail-content" style="flex:1;min-width:0;"></div>
        </div>
      </div>
    </div>

    <!-- 侧边栏 -->
    <aside class="blog-sidebar">
      <div class="blog-sidebar-card glass">
        <h3><i class="fas fa-folder"></i> 分类</h3>
        <div class="blog-sidebar-list" id="category-list"><span style="opacity:0.5;font-size:0.85rem;">加载中...</span></div>
      </div>
      <div class="blog-sidebar-card glass">
        <h3><i class="fas fa-tags"></i> 标签</h3>
        <div class="blog-sidebar-list" id="tag-list"><span style="opacity:0.5;font-size:0.85rem;">加载中...</span></div>
      </div>
    </aside>
  </div>

  <script src="../assets/js/main.js"></script>
  <script>
    // ==========================================
    // 博客前台逻辑
    // ==========================================
    const BLOG_API = (() => {
      try { return new URL('../server/api/blog.php', window.location.href).toString(); }
      catch(e) { return window.location.origin + '/server/api/blog.php'; }
    })();

    let currentPage = 1, totalPages = 1, currentCat = '', currentTag = '';

    // ── 加载分类/标签侧边栏 ──
    async function loadSidebar() {
      try {
        const [catRes, tagRes] = await Promise.all([
          fetch(BLOG_API + '?action=categories'),
          fetch(BLOG_API + '?action=tags')
        ]);
        const cats = await catRes.json();
        const tags = await tagRes.json();

        const catEl = document.getElementById('category-list');
        catEl.innerHTML = '<a class="blog-sidebar-item' + (currentCat === '' ? ' active' : '') + '" data-cat="">全部</a>';
        (cats.categories || []).forEach(c => {
          catEl.innerHTML += '<a class="blog-sidebar-item' + (currentCat === c.slug ? ' active' : '') + '" data-cat="' + c.slug + '">' + c.name + '<span class="blog-sidebar-count">(' + c.post_count + ')</span></a>';
        });
        catEl.querySelectorAll('[data-cat]').forEach(a => {
          a.addEventListener('click', () => { currentCat = a.dataset.cat; currentTag = ''; loadPosts(1); updateSidebarActive(); });
        });

        const tagEl = document.getElementById('tag-list');
        tagEl.innerHTML = (tags.tags || []).map(t =>
          '<a class="blog-sidebar-item' + (currentTag === t.slug ? ' active' : '') + '" data-tag="' + t.slug + '">' + t.name + '<span class="blog-sidebar-count">(' + t.post_count + ')</span></a>'
        ).join('');
        tagEl.querySelectorAll('[data-tag]').forEach(a => {
          a.addEventListener('click', () => { currentTag = a.dataset.tag; currentCat = ''; loadPosts(1); updateSidebarActive(); });
        });
      } catch(e) { /* ignore */ }
    }

    function updateSidebarActive() {
      document.querySelectorAll('#category-list [data-cat]').forEach(a => a.classList.toggle('active', a.dataset.cat === currentCat));
      document.querySelectorAll('#tag-list [data-tag]').forEach(a => a.classList.toggle('active', a.dataset.tag === currentTag));
    }

    // ── 加载文章列表 ──
    async function loadPosts(page = 1) {
      currentPage = page;
      const el = document.getElementById('blog-posts');
      el.innerHTML = '<div class="blog-loading">加载中...</div>';
      try {
        let url = BLOG_API + '?action=posts&page=' + page;
        if (currentCat) url += '&category=' + currentCat;
        if (currentTag) url += '&tag=' + currentTag;
        const res = await fetch(url);
        const data = await res.json();
        const posts = data.posts || [];
        const pg = data.pagination || {};
        totalPages = pg.totalPages || 1;

        if (posts.length === 0) {
          el.innerHTML = '<div class="blog-loading">暂无文章</div>';
          document.getElementById('blog-pagination').innerHTML = '';
          return;
        }

        el.innerHTML = posts.map(p => {
          const cover = p.cover_image ? '<img class="blog-card-cover" src="' + p.cover_image + '" alt="">' : '<div class="blog-card-cover"></div>';
          const tags = (p.tags || []).map(t => '<span class="blog-tag">' + t.name + '</span>').join('');
          const date = new Date(p.created_at);
          const dateStr = isNaN(date.getTime()) ? '' : date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
          return '<article class="blog-card glass" data-slug="' + p.slug + '">' + cover +
            '<div class="blog-card-body">' +
            (p.category_name ? '<div class="blog-card-cat">' + p.category_name + '</div>' : '') +
            '<h2 class="blog-card-title">' + p.title + '</h2>' +
            '<p class="blog-card-excerpt">' + (p.excerpt || '') + '</p>' +
            (tags ? '<div class="blog-card-tags">' + tags + '</div>' : '') +
            '<div class="blog-card-meta"><span><i class="far fa-calendar"></i> ' + dateStr + '</span><span><i class="far fa-eye"></i> ' + p.views + ' 阅读</span></div>' +
            '</div></article>';
        }).join('');

        el.querySelectorAll('.blog-card').forEach(card => {
          card.addEventListener('click', () => showPost(card.dataset.slug));
        });

        buildPagination();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch(e) { el.innerHTML = '<div class="blog-loading">加载失败</div>'; }
    }

    function buildPagination() {
      const pg = document.getElementById('blog-pagination');
      pg.innerHTML = '';
      if (totalPages <= 1) return;
      const btn = (label, target, disabled) => {
        const b = document.createElement('button');
        b.textContent = label; b.className = 'blog-page-btn' + (target === currentPage ? ' active' : '');
        if (disabled) b.disabled = true;
        b.addEventListener('click', () => loadPosts(target));
        return b;
      };
      pg.appendChild(btn('‹', currentPage - 1, currentPage <= 1));
      for (let i = 1; i <= totalPages; i++) {
        if (totalPages <= 7 || i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1)
          pg.appendChild(btn(String(i), i));
        else if ((i === 2 && currentPage > 3) || (i === totalPages - 1 && currentPage < totalPages - 2)) {
          const s = document.createElement('span'); s.textContent = '…'; s.style.padding = '0 4px'; pg.appendChild(s);
        }
      }
      pg.appendChild(btn('›', currentPage + 1, currentPage >= totalPages));
    }

    // ── 文章详情 ──
    async function showPost(slug) {
      document.getElementById('blog-list-view').style.display = 'none';
      const detail = document.getElementById('blog-detail');
      detail.classList.add('active');
      document.getElementById('detail-content').innerHTML = '<div class="blog-loading">加载中...</div>';
      try {
        const res = await fetch(BLOG_API + '?action=post&slug=' + slug);
        const data = await res.json();
        const post = data.post;
        if (!post) { document.getElementById('detail-content').innerHTML = '<div class="blog-loading">文章不存在</div>'; return; }
        const date = new Date(post.created_at);
        const dateStr = isNaN(date.getTime()) ? '' : date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
        const tags = (post.tags || []).map(t => '<span class="blog-tag">' + t.name + '</span>').join('');
        document.getElementById('detail-content').innerHTML =
          '<h1>' + post.title + '</h1>' +
          '<div class="blog-detail-meta">' +
          '<span><i class="far fa-calendar"></i> ' + dateStr + '</span>' +
          (post.category_name ? '<span><i class="far fa-folder"></i> ' + post.category_name + '</span>' : '') +
          '<span><i class="far fa-eye"></i> ' + (post.views + 1) + ' 阅读</span>' +
          '</div>' +
          (post.cover_image ? '<img class="blog-detail-cover" src="' + post.cover_image + '" alt="">' : '') +
          (tags ? '<div class="blog-card-tags" style="margin-bottom:16px;">' + tags + '</div>' : '') +
          '<div class="blog-detail-content">' + (post.content_html || '') + '</div>';
        buildTOC();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch(e) { document.getElementById('detail-content').innerHTML = '<div class="blog-loading">加载失败</div>'; }
    }

    // ── 生成目录 ──
    function buildTOC() {
      const tocEl = document.getElementById('blog-toc');
      const tocList = document.getElementById('toc-list');
      const content = document.getElementById('detail-content');
      const headings = content.querySelectorAll('.blog-detail-content h2, .blog-detail-content h3');
      if (headings.length === 0) { tocEl.classList.remove('active'); return; }
      tocEl.classList.add('active');
      tocList.innerHTML = '';
      headings.forEach((h, i) => {
        const id = h.id || ('toc-' + i);
        if (!h.id) h.id = id;
        const li = document.createElement('li');
        li.className = 'blog-toc-item ' + (h.tagName === 'H2' ? 'toc-h2' : 'toc-h3');
        li.innerHTML = '<a href="#' + id + '">' + h.textContent + '</a>';
        li.addEventListener('click', (e) => {
          e.preventDefault();
          document.querySelectorAll('.blog-toc-item').forEach(el => el.classList.remove('active'));
          li.classList.add('active');
          document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        });
        tocList.appendChild(li);
      });

      // 滚动高亮
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll('.blog-toc-item').forEach(el => el.classList.remove('active'));
            const link = tocList.querySelector('a[href="#' + entry.target.id + '"]');
            if (link) link.parentElement.classList.add('active');
          }
        });
      }, { rootMargin: '-80px 0px -60% 0px' });
      headings.forEach(h => observer.observe(h));
    }

    function showList() {
      document.getElementById('blog-list-view').style.display = 'block';
      document.getElementById('blog-detail').classList.remove('active');
      document.getElementById('blog-toc').classList.remove('active');
    }

    // ── URL 参数检测：?slug=xxx 直达文章 ──
    const urlParams = new URLSearchParams(window.location.search);
    const slugParam = urlParams.get('slug');
    if (slugParam) { showPost(slugParam); } else { loadPosts(); }
    loadSidebar();
  </script>
</body>
</html>
