<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mingine的小站 - 主页</title>
  <link rel="icon" type="image/jpeg" href="assets/images/image00.png">
  <meta name="description" content="这是一个展示Mingine个性化内容的小站">
  <link rel="preload" as="image" href="assets/images/bg.webp" fetchpriority="high">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar glass">
    <a href="index.html" class="nav-brand">Mingine</a>
    <div class="nav-links">
      <a href="index.html">首页</a>
      <a href="pages/blog.html" target="_blank" rel="noopener noreferrer">博客</a>
      <a href="pages/dashboard.html" target="_blank" rel="noopener noreferrer">仪表盘</a>
      <a href="pages/contact.html" target="_blank" rel="noopener noreferrer">联系我</a>
      <button class="theme-toggle" id="theme-btn" aria-label="切换主题">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </nav>

  <section class="home-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content container">
      <div class="profile-card glass hero-profile-card">
        <img src="assets/images/image00.jpg" alt="Mingine" class="profile-img">
        <h1>Hi, 我是 Mingine </h1>
        <p style="margin-top: 15px; color: var(--text-color); opacity: 0.9;">
          欢迎来到Mingine的小站！<br>
          网站还在建设中<br>
          你可以和 AI Bot 聊聊天，或者点击下列标签按钮体验对应的功能。
        </p>
        
        <div class="tags">
          <a href="pages/portfolio.html" target="_blank" rel="noopener noreferrer" class="tag tag-link" id="tag-dev"><i class="fas fa-code"></i> 开发</a>
          <a href="pages/game.html" target="_blank" rel="noopener noreferrer" class="tag" style="text-decoration: none; display: inline-block; color: white; cursor: pointer;"><i class="fas fa-gamepad"></i> 游戏</a>
          <button type="button" class="tag tag-button" id="tag-music"><i class="fas fa-music"></i> 音乐</button>
          <span class="tag"><i class="fas fa-book"></i> 漫画</span>
          <button type="button" class="tag tag-button" id="tag-ai-chat"><i class="fas fa-robot"></i> AI Bot</button>
          <a href="pages/contact.html#guestbook" target="_blank" rel="noopener noreferrer" class="tag" style="text-decoration: none; display: inline-block; color: white; cursor: pointer;"><i class="fas fa-pen"></i> 留言板</a>
          <a href="pages/drive.html" target="_blank" rel="noopener noreferrer" class="tag tag-link"><i class="fas fa-cloud"></i> 云盘</a>
        </div>
      </div>
    </div>
  </section>

  <!-- 网易云音乐外链播放器组件 -->
  <div class="music-widget glass collapsed" id="music-widget">
    <button class="music-toggle" id="music-toggle" aria-expanded="false" aria-controls="music-frame-wrap">
      <span><i class="fas fa-music"></i> 音乐播放器</span>
      <i class="fas fa-expand" id="music-toggle-icon"></i>
    </button>
    <div class="music-frame-wrap" id="music-frame-wrap">
      <div class="music-source-switch" role="tablist" aria-label="播放器选择">
        <button class="music-source-btn active" id="source-netease" data-source="netease" role="tab" aria-selected="true">网易云</button>
        <button class="music-source-btn" id="source-spotify" data-source="spotify" role="tab" aria-selected="false">Spotify</button>
      </div>

      <div class="music-source-panel active" id="panel-netease" role="tabpanel" aria-labelledby="source-netease">
        <iframe
          src="https://music.163.com/outchain/player?type=0&id=60131&auto=0&height=400"
          width="100%"
          height="400"
          frameborder="0"
          allow="autoplay; encrypted-media"
          loading="lazy"
          title="Netease music player"
        ></iframe>
      </div>

      <div class="music-source-panel" id="panel-spotify" role="tabpanel" aria-labelledby="source-spotify">
        <iframe
          data-src="https://open.spotify.com/embed/playlist/6GXjNo0bLnZ5K9J1JXbK9r?utm_source=generator"
          width="100%"
          height="352"
          frameborder="0"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy"
          title="Spotify playlist player"
        ></iframe>
      </div>
    </div>
  </div>

  <!-- AI 聊天机器人悬浮窗 -->
  <div class="ai-fab" id="chat-fab">
    <i class="fas fa-comment-dots"></i>
  </div>
  
  <div class="chat-window glass" id="chat-window">
    <div class="chat-header">
      <span style="font-weight: bold;">Mingine Bot</span>
      <span class="close-chat" id="close-chat">&times;</span>
    </div>
    <div class="chat-body" id="chat-body">
      <div class="chat-msg msg-bot">你好！我是Mingine的AI助理，有什么我可以帮你的吗？</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="输入你想说的内容..." />
      <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/ai-chat.js"></script>
  <script src="assets/js/music-player.js"></script>
</body>
</html>
